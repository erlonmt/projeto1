<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>
      <span style="letter-spacing:2px; font-weight:bold;">Sobre</span>
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding"
  style="background: linear-gradient(135deg, #e3f0ff 0%, #f6d365 100%);">
  <ion-header collapse="condense">
    <ion-toolbar color="primary">
      <ion-title size="large" style="font-size:2.2rem; letter-spacing:2px; font-weight:bold;">Sobre</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-card
    style="max-width: 400px; margin: 24px auto; box-shadow: 0 6px 28px rgba(0,0,0,0.16); border-radius: 24px; overflow: visible;">
    <img alt="toten digital" src="https://wisetechti.com.br/assets/images/-touch7-506x304.jpg"
      style="border-radius: 24px 24px 0 0; box-shadow: 0 4px 24px rgba(126, 213, 111, 0.07);" />
    <ion-card-content style="font-size:1.15rem; color: #444; margin-bottom:1.5rem; text-align: center;">
      <ion-icon name="school-outline" slot="icon-only"
        style="font-size: 2rem; color: #fcb900; margin-bottom: 8px;"></ion-icon>
      <br>
      Este aplicativo foi desenvolvido como parte da avaliação para a disciplina de <strong>Desenvolvimento
        Móvel</strong>.
      <br><br>
    </ion-card-content>
  </ion-card>

  <!-- Lista de alunos -->
  <ion-card
    style="max-width: 400px; margin: 24px auto; border-radius: 20px; box-shadow: 0 4px 18px rgba(0,0,0,0.10); overflow: visible;">
    <ion-card-header>
      <ion-card-title style="text-align:center; font-size: 1.2rem; color:#374151; letter-spacing:1px;">
        Alunos
      </ion-card-title>
    </ion-card-header>
    <ion-card-content style="font-size: 1.05rem; color: #444; text-align: center; padding-bottom: 16px;">
      <ion-list>
        <ion-item lines="none">
          <ion-avatar slot="start">
            <ion-icon name="person-circle-outline" style="font-size: 2.2rem; color: #7ec3ff;"></ion-icon>
          </ion-avatar>
          <ion-label>Erlon Matheus</ion-label>
        </ion-item>
      </ion-list>
    </ion-card-content>
  </ion-card>

</ion-content>
